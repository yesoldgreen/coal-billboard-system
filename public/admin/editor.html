<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑告示牌数据</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f0f2f5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-block;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #1890ff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #40a9ff;
        }

        .btn-success {
            background-color: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background-color: #73d13d;
        }

        .btn-danger {
            background-color: #ff4d4f;
            color: white;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            color: #595959;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
            font-size: 15px;
        }

        .tab.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 10px;
            border: 1px solid #e8e8e8;
            text-align: center;
        }

        .data-table th {
            background-color: #fafafa;
            font-weight: 600;
            color: #262626;
        }

        .data-table input,
        .data-table select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .data-table input:focus,
        .data-table select:focus {
            outline: none;
            border-color: #1890ff;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            color: #262626;
        }

        /* v1.5: 自动填充样式 */
        .autofill-section {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .autofill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }

        .autofill-title {
            font-size: 15px;
            font-weight: 600;
            color: #52c41a;
        }

        .autofill-hint {
            font-size: 12px;
            color: #8c8c8c;
            margin-bottom: 10px;
        }

        .autofill-textarea {
            width: 100%;
            min-height: 120px;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }

        .autofill-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .autofill-message {
            flex: 1;
            font-size: 13px;
            color: #52c41a;
        }

        .autofill-collapsed {
            display: none;
        }

        .ad-list {
            margin-bottom: 15px;
        }

        .ad-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .ad-item input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
        }

        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .message.success {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }

        .message.error {
            background-color: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8c8c8c;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="pageTitle">编辑告示牌数据</h1>
        <div>
            <a href="index.html" class="btn btn-primary">← 返回列表</a>
        </div>
    </div>

    <div class="container">
        <div id="message"></div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('queue')">排队拉运</button>
                <button class="tab" onclick="switchTab('quality')">质量/价格</button>
                <button class="tab" onclick="switchTab('logistics')">物流费用</button>
            </div>

            <!-- 排队拉运 -->
            <div id="queue" class="tab-content active">
                <!-- v1.5: 自动填充功能 -->
                <div class="autofill-section">
                    <div class="autofill-header" onclick="toggleAutofill()">
                        <div class="autofill-title">🔽 自动填充</div>
                        <button class="btn btn-primary" style="font-size: 13px; padding: 5px 12px;" onclick="event.stopPropagation(); manageMappings()">管理映射</button>
                    </div>
                    <div id="autofillContent" class="autofill-content">
                        <div class="autofill-hint">粘贴格式：煤种名称: 数字 (例如：汇能2号洗混块煤: 103)</div>
                        <textarea id="autofillText" class="autofill-textarea" placeholder="汇能2号洗混块煤: 103&#10;汇能1号洗混中块煤:675&#10;汇能3号洗沫煤:2&#10;..."></textarea>
                        <div class="autofill-actions">
                            <button class="btn btn-success" onclick="recognizeAutofill()">识别并填充</button>
                            <span id="autofillMessage" class="autofill-message"></span>
                        </div>
                    </div>
                </div>

                <div class="section-title">📊 排队拉运数据</div>
                <table class="data-table" id="queueTable">
                    <thead>
                        <tr>
                            <th style="width: 20%">煤种</th>
                            <th style="width: 15%">已预约</th>
                            <th style="width: 15%">排队中</th>
                            <th style="width: 15%">已叫号</th>
                            <th style="width: 15%">已入场</th>
                            <th style="width: 10%">操作</th>
                        </tr>
                    </thead>
                    <tbody id="queueData"></tbody>
                </table>
                <button class="btn btn-primary" onclick="addQueueRow()">+ 添加行</button>

                <div class="section-title">📢 广告</div>
                <div class="ad-list" id="queueAds"></div>
                <button class="btn btn-primary" onclick="addQueueAd()">+ 添加广告</button>
                <br><br>
                <button class="btn btn-success" style="font-size: 16px; padding: 12px 30px;" onclick="saveQueue()">💾 保存排队拉运数据</button>
            </div>

            <!-- 质量/价格 -->
            <div id="quality" class="tab-content">
                <div class="section-title">📊 质量/价格数据</div>
                <table class="data-table" id="qualityTable">
                    <thead>
                        <tr>
                            <th style="width: 15%">煤种</th>
                            <th style="width: 12%">热值</th>
                            <th style="width: 12%">灰分</th>
                            <th style="width: 12%">硫</th>
                            <th style="width: 15%">含税价格</th>
                            <th style="width: 15%">较上期变动</th>
                            <th style="width: 10%">操作</th>
                        </tr>
                    </thead>
                    <tbody id="qualityData"></tbody>
                </table>
                <button class="btn btn-primary" onclick="addQualityRow()">+ 添加行</button>

                <div class="section-title" style="margin-top: 20px;">⏰ 价格执行时间</div>
                <input type="text" id="priceExecutionTime" placeholder="例如：2026年3月10日11:30时起执行单价" style="width: 100%; padding: 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;">

                <div class="section-title">📢 广告</div>
                <div class="ad-list" id="qualityAds"></div>
                <button class="btn btn-primary" onclick="addQualityAd()">+ 添加广告</button>
                <br><br>
                <button class="btn btn-success" style="font-size: 16px; padding: 12px 30px;" onclick="saveQuality()">💾 保存质量/价格数据</button>
            </div>

            <!-- 物流费用 -->
            <div id="logistics" class="tab-content">
                <!-- 长途运输 -->
                <div class="section-title">🚗 长途运输</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 30%">起点</th>
                            <th style="width: 30%">终点</th>
                            <th style="width: 25%">运费</th>
                            <th style="width: 15%">操作</th>
                        </tr>
                    </thead>
                    <tbody id="highwayData"></tbody>
                </table>
                <button class="btn btn-primary" onclick="addHighwayRow()">+ 添加行</button>

                <!-- 集运站 -->
                <div class="section-title" style="margin-top: 30px;">🏪 集运站</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 35%">集运站名称</th>
                            <th style="width: 25%">上站运费</th>
                            <th style="width: 25%">站台费</th>
                            <th style="width: 15%">操作</th>
                        </tr>
                    </thead>
                    <tbody id="stationData"></tbody>
                </table>
                <button class="btn btn-primary" onclick="addStationRow()">+ 添加行</button>

                <!-- 铁路运输 -->
                <div class="section-title" style="margin-top: 30px;">🚂 铁路运输</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 30%">起点</th>
                            <th style="width: 30%">终点</th>
                            <th style="width: 25%">运费</th>
                            <th style="width: 15%">操作</th>
                        </tr>
                    </thead>
                    <tbody id="railwayData"></tbody>
                </table>
                <button class="btn btn-primary" onclick="addRailwayRow()">+ 添加行</button>

                <!-- 广告 -->
                <div class="section-title" style="margin-top: 30px;">📢 广告</div>
                <div class="ad-list" id="logisticsAds"></div>
                <button class="btn btn-primary" onclick="addLogisticsAd()">+ 添加广告</button>
                <br><br>
                <button class="btn btn-success" style="font-size: 16px; padding: 12px 30px;" onclick="saveLogistics()">💾 保存物流费用数据</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const token = localStorage.getItem('token');
        const urlParams = new URLSearchParams(window.location.search);
        const billboardId = urlParams.get('id');

        if (!token || !billboardId) {
            window.location.href = 'index.html';
        }

        let queueData = [];
        let queueAds = [];
        let qualityData = [];
        let qualityAds = [];
        let logisticsData = [];
        let logisticsAds = [];

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // 显示消息
        function showMessage(text, type = 'success') {
            const msgEl = document.getElementById('message');
            msgEl.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => msgEl.innerHTML = '', 3000);
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch(`${API_BASE_URL}/billboards/${billboardId}/data`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (result.success) {
                    document.getElementById('pageTitle').textContent = `编辑告示牌数据 - ${result.data.billboard.name}`;
                    queueData = result.data.queue || [];
                    queueAds = result.data.queueAds || [];
                    qualityData = result.data.quality || [];
                    qualityAds = result.data.qualityAds || [];
                    logisticsData = result.data.logistics || [];
                    logisticsAds = result.data.logisticsAds || [];

                    // v1.4.4: 加载价格执行时间
                    const updateTimes = result.data.updateTimes || [];
                    const qualityUpdateInfo = updateTimes.find(item => item.module_type === 'quality');
                    if (qualityUpdateInfo && qualityUpdateInfo.price_execution_time) {
                        document.getElementById('priceExecutionTime').value = qualityUpdateInfo.price_execution_time;
                    }

                    renderQueue();
                    renderQuality();
                    renderLogistics();
                }
            } catch (error) {
                showMessage('加载数据失败: ' + error.message, 'error');
            }
        }

        // 排队拉运
        function renderQueue() {
            const tbody = document.getElementById('queueData');
            tbody.innerHTML = queueData.length === 0 ? '<tr><td colspan="6">暂无数据，点击"添加行"开始</td></tr>' :
                queueData.map((item, index) => `
                    <tr>
                        <td><input type="text" value="${item.pit_name || ''}" onchange="queueData[${index}].pit_name = this.value"></td>
                        <td><input type="text" value="${item.contracted || ''}" onchange="queueData[${index}].contracted = this.value"></td>
                        <td><input type="text" value="${item.queuing || ''}" onchange="queueData[${index}].queuing = this.value"></td>
                        <td><input type="text" value="${item.called || ''}" onchange="queueData[${index}].called = this.value"></td>
                        <td><input type="text" value="${item.entered || ''}" onchange="queueData[${index}].entered = this.value"></td>
                        <td><button class="btn btn-danger" onclick="deleteQueueRow(${index})">删除</button></td>
                    </tr>
                `).join('');

            const adsEl = document.getElementById('queueAds');
            adsEl.innerHTML = queueAds.map((ad, index) => `
                <div class="ad-item">
                    <input type="text" value="${ad.content || ''}" onchange="queueAds[${index}].content = this.value" placeholder="例如：八通煤炭 136 1234 5678 汇能长滩专业代发 九年老店">
                    <button class="btn btn-danger" onclick="deleteQueueAd(${index})">删除</button>
                </div>
            `).join('');
        }

        function addQueueRow() {
            queueData.push({ pit_name: '', contracted: '', queuing: '', called: '', entered: '' });
            renderQueue();
        }

        function deleteQueueRow(index) {
            queueData.splice(index, 1);
            renderQueue();
        }

        function addQueueAd() {
            queueAds.push({ content: '' });
            renderQueue();
        }

        function deleteQueueAd(index) {
            queueAds.splice(index, 1);
            renderQueue();
        }

        async function saveQueue() {
            try {
                await fetch(`${API_BASE_URL}/billboards/${billboardId}/queue`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ data: queueData })
                });

                await fetch(`${API_BASE_URL}/billboards/${billboardId}/ads`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ moduleType: 'queue', data: queueAds })
                });

                showMessage('✅ 排队拉运数据保存成功！');
            } catch (error) {
                showMessage('❌ 保存失败: ' + error.message, 'error');
            }
        }

        // 质量/价格
        function renderQuality() {
            const tbody = document.getElementById('qualityData');
            tbody.innerHTML = qualityData.length === 0 ? '<tr><td colspan="7">暂无数据，点击"添加行"开始</td></tr>' :
                qualityData.map((item, index) => `
                    <tr>
                        <td><input type="text" value="${item.pit_name || ''}" onchange="qualityData[${index}].pit_name = this.value"></td>
                        <td><input type="text" value="${item.heat_value || ''}" onchange="qualityData[${index}].heat_value = this.value"></td>
                        <td><input type="text" value="${item.ash || ''}" onchange="qualityData[${index}].ash = this.value"></td>
                        <td><input type="text" value="${item.sulfur || ''}" onchange="qualityData[${index}].sulfur = this.value"></td>
                        <td><input type="text" value="${item.price || ''}" onchange="qualityData[${index}].price = this.value"></td>
                        <td><input type="text" value="${item.change_value || ''}" onchange="qualityData[${index}].change_value = this.value" placeholder="+10 或 -5"></td>
                        <td><button class="btn btn-danger" onclick="deleteQualityRow(${index})">删除</button></td>
                    </tr>
                `).join('');

            const adsEl = document.getElementById('qualityAds');
            adsEl.innerHTML = qualityAds.map((ad, index) => `
                <div class="ad-item">
                    <input type="text" value="${ad.content || ''}" onchange="qualityAds[${index}].content = this.value" placeholder="例如：诚信煤炭 150 0000 8888 汇能煤质检测 权威认证">
                    <button class="btn btn-danger" onclick="deleteQualityAd(${index})">删除</button>
                </div>
            `).join('');
        }

        function addQualityRow() {
            qualityData.push({ pit_name: '', heat_value: '', ash: '', sulfur: '', price: '', change_value: '' });
            renderQuality();
        }

        function deleteQualityRow(index) {
            qualityData.splice(index, 1);
            renderQuality();
        }

        function addQualityAd() {
            qualityAds.push({ content: '' });
            renderQuality();
        }

        function deleteQualityAd(index) {
            qualityAds.splice(index, 1);
            renderQuality();
        }

        async function saveQuality() {
            try {
                // v1.4.4: 获取价格执行时间
                const priceExecutionTime = document.getElementById('priceExecutionTime').value.trim();

                await fetch(`${API_BASE_URL}/billboards/${billboardId}/quality`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        data: qualityData,
                        priceExecutionTime: priceExecutionTime || null
                    })
                });

                await fetch(`${API_BASE_URL}/billboards/${billboardId}/ads`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ moduleType: 'quality', data: qualityAds })
                });

                showMessage('✅ 质量/价格数据保存成功！');
            } catch (error) {
                showMessage('❌ 保存失败: ' + error.message, 'error');
            }
        }

        // 物流费用 - v1.1 三个独立子模块
        function renderLogistics() {
            // 分离数据
            const highwayItems = logisticsData.filter(item => item.route_type === 'highway');
            const stationItems = logisticsData.filter(item => item.route_type === 'station');
            const railwayItems = logisticsData.filter(item => item.route_type === 'railway');

            // 渲染公路运输
            const highwayTbody = document.getElementById('highwayData');
            highwayTbody.innerHTML = highwayItems.length === 0 ? '<tr><td colspan="4">暂无数据，点击"添加行"开始</td></tr>' :
                highwayItems.map((item, index) => {
                    const globalIndex = logisticsData.indexOf(item);
                    return `
                        <tr>
                            <td><input type="text" value="${item.from_location || ''}" onchange="logisticsData[${globalIndex}].from_location = this.value" placeholder="例如：长滩矿"></td>
                            <td><input type="text" value="${item.to_location || ''}" onchange="logisticsData[${globalIndex}].to_location = this.value" placeholder="例如：邯郸"></td>
                            <td><input type="text" value="${item.freight || ''}" onchange="logisticsData[${globalIndex}].freight = this.value" placeholder="例如：120"></td>
                            <td><button class="btn btn-danger" onclick="deleteLogisticsItem(${globalIndex})">删除</button></td>
                        </tr>
                    `;
                }).join('');

            // 渲染集运站
            const stationTbody = document.getElementById('stationData');
            stationTbody.innerHTML = stationItems.length === 0 ? '<tr><td colspan="4">暂无数据，点击"添加行"开始</td></tr>' :
                stationItems.map((item, index) => {
                    const globalIndex = logisticsData.indexOf(item);
                    return `
                        <tr>
                            <td><input type="text" value="${item.station_name || ''}" onchange="logisticsData[${globalIndex}].station_name = this.value" placeholder="例如：派山集运站"></td>
                            <td><input type="text" value="${item.station_loading_fee || ''}" onchange="logisticsData[${globalIndex}].station_loading_fee = this.value" placeholder="例如：80"></td>
                            <td><input type="text" value="${item.station_fee || ''}" onchange="logisticsData[${globalIndex}].station_fee = this.value" placeholder="例如：15"></td>
                            <td><button class="btn btn-danger" onclick="deleteLogisticsItem(${globalIndex})">删除</button></td>
                        </tr>
                    `;
                }).join('');

            // 渲染铁路运输
            const railwayTbody = document.getElementById('railwayData');
            railwayTbody.innerHTML = railwayItems.length === 0 ? '<tr><td colspan="4">暂无数据，点击"添加行"开始</td></tr>' :
                railwayItems.map((item, index) => {
                    const globalIndex = logisticsData.indexOf(item);
                    return `
                        <tr>
                            <td><input type="text" value="${item.from_location || ''}" onchange="logisticsData[${globalIndex}].from_location = this.value" placeholder="例如：长滩站"></td>
                            <td><input type="text" value="${item.to_location || ''}" onchange="logisticsData[${globalIndex}].to_location = this.value" placeholder="例如：邯郸站"></td>
                            <td><input type="text" value="${item.freight || ''}" onchange="logisticsData[${globalIndex}].freight = this.value" placeholder="例如：200"></td>
                            <td><button class="btn btn-danger" onclick="deleteLogisticsItem(${globalIndex})">删除</button></td>
                        </tr>
                    `;
                }).join('');

            // 渲染广告
            const adsEl = document.getElementById('logisticsAds');
            adsEl.innerHTML = logisticsAds.map((ad, index) => `
                <div class="ad-item">
                    <input type="text" value="${ad.content || ''}" onchange="logisticsAds[${index}].content = this.value" placeholder="例如：友达物流 138 0000 8888 汇能长滩派山店专线 河北 内蒙">
                    <button class="btn btn-danger" onclick="deleteLogisticsAd(${index})">删除</button>
                </div>
            `).join('');
        }

        function addHighwayRow() {
            logisticsData.push({ route_type: 'highway', from_location: '', to_location: '', freight: '' });
            renderLogistics();
        }

        function addStationRow() {
            logisticsData.push({ route_type: 'station', station_name: '', station_loading_fee: '', station_fee: '' });
            renderLogistics();
        }

        function addRailwayRow() {
            logisticsData.push({ route_type: 'railway', from_location: '', to_location: '', freight: '' });
            renderLogistics();
        }

        function deleteLogisticsItem(index) {
            logisticsData.splice(index, 1);
            renderLogistics();
        }

        function addLogisticsAd() {
            logisticsAds.push({ content: '' });
            renderLogistics();
        }

        function deleteLogisticsAd(index) {
            logisticsAds.splice(index, 1);
            renderLogistics();
        }

        async function saveLogistics() {
            try {
                await fetch(`${API_BASE_URL}/billboards/${billboardId}/logistics`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ data: logisticsData })
                });

                await fetch(`${API_BASE_URL}/billboards/${billboardId}/ads`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ moduleType: 'logistics', data: logisticsAds })
                });

                showMessage('✅ 物流费用数据保存成功！');
            } catch (error) {
                showMessage('❌ 保存失败: ' + error.message, 'error');
            }
        }

        // ==================== v1.5: 自动填充功能 ====================

        // 切换自动填充区域展开/折叠
        function toggleAutofill() {
            const content = document.getElementById('autofillContent');
            content.classList.toggle('autofill-collapsed');
            const title = document.querySelector('.autofill-title');
            if (content.classList.contains('autofill-collapsed')) {
                title.textContent = '▶️ 自动填充';
            } else {
                title.textContent = '🔽 自动填充';
            }
        }

        // 解析文本
        function parseAutofillText(text) {
            const lines = text.split('\n').filter(line => line.trim());
            const parsed = [];
            const regex = /^(.+?)\s*[:：]\s*(\d+)\s*$/;

            for (const line of lines) {
                const match = line.match(regex);
                if (match) {
                    parsed.push({
                        name: match[1].trim(),
                        value: match[2].trim()
                    });
                }
            }

            return parsed;
        }

        // 识别并填充
        async function recognizeAutofill() {
            const text = document.getElementById('autofillText').value;
            if (!text.trim()) {
                document.getElementById('autofillMessage').textContent = '⚠️ 请输入数据';
                document.getElementById('autofillMessage').style.color = '#faad14';
                return;
            }

            // 解析文本
            const parsed = parseAutofillText(text);
            if (parsed.length === 0) {
                document.getElementById('autofillMessage').textContent = '⚠️ 未识别到有效数据，请检查格式';
                document.getElementById('autofillMessage').style.color = '#ff4d4f';
                return;
            }

            // 获取映射关系
            try {
                const response = await fetch(`${API_BASE_URL}/billboards/${billboardId}/autofill-mappings?module=queue`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                const mappings = result.data || [];

                if (mappings.length === 0) {
                    // 首次配置
                    await showFirstTimeConfig(parsed);
                } else {
                    // 日常更新
                    await applyAutofill(parsed, mappings);
                }
            } catch (error) {
                document.getElementById('autofillMessage').textContent = '❌ 错误: ' + error.message;
                document.getElementById('autofillMessage').style.color = '#ff4d4f';
            }
        }

        // 首次配置
        async function showFirstTimeConfig(parsed) {
            const html = `
                <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;" id="configModal">
                    <div style="background: white; border-radius: 8px; padding: 20px; max-width: 800px; max-height: 80vh; overflow-y: auto; width: 90%;">
                        <h3 style="margin-bottom: 15px;">首次配置 - 建立映射关系</h3>
                        <p style="color: #8c8c8c; font-size: 13px; margin-bottom: 15px;">左侧为数据源名称，右侧输入看板上要显示的名称</p>
                        <table class="data-table" style="margin-bottom: 20px;">
                            <thead>
                                <tr>
                                    <th style="width: 35%;">数据源名称</th>
                                    <th style="width: 35%;">看板显示名称</th>
                                    <th style="width: 15%;">排队中</th>
                                    <th style="width: 15%;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="configTableBody">
                                ${parsed.map((item, index) => `
                                    <tr>
                                        <td>${item.name}</td>
                                        <td><input type="text" id="displayName_${index}" placeholder="输入简化名称" style="width: 100%; padding: 6px;"></td>
                                        <td>${item.value}</td>
                                        <td><button class="btn btn-danger" style="font-size: 12px; padding: 4px 8px;" onclick="removeConfigRow(${index})">删除</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div style="display: flex; gap: 10px; justify-content: flex-end;">
                            <button class="btn btn-danger" onclick="closeConfigModal()">取消</button>
                            <button class="btn btn-success" onclick="saveFirstTimeConfig(${JSON.stringify(parsed).replace(/"/g, '&quot;')})">保存并创建</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        // 关闭配置弹窗
        function closeConfigModal() {
            const modal = document.getElementById('configModal');
            if (modal) modal.remove();
        }

        // 保存首次配置
        async function saveFirstTimeConfig(parsed) {
            const mappings = [];
            const formData = [];

            for (let i = 0; i < parsed.length; i++) {
                const displayNameInput = document.getElementById(`displayName_${i}`);
                if (!displayNameInput) continue; // 行已删除

                const displayName = displayNameInput.value.trim();
                if (!displayName) {
                    alert('请为所有煤种输入显示名称');
                    return;
                }

                mappings.push({
                    source_name: parsed[i].name,
                    display_name: displayName
                });

                formData.push({
                    pit_name: displayName,
                    contracted: '',
                    queuing: parsed[i].value,
                    called: '',
                    entered: ''
                });
            }

            try {
                // 保存映射
                await fetch(`${API_BASE_URL}/billboards/${billboardId}/autofill-mappings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ module: 'queue', mappings: mappings })
                });

                // 更新表单数据
                queueData = formData;
                renderQueue();

                closeConfigModal();
                document.getElementById('autofillMessage').textContent = `✓ 已创建 ${formData.length} 个煤种及映射关系`;
                document.getElementById('autofillMessage').style.color = '#52c41a';
                document.getElementById('autofillText').value = '';
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }

        // 应用自动填充（日常更新）
        async function applyAutofill(parsed, mappings) {
            const mappingMap = {};
            mappings.forEach(m => {
                mappingMap[m.source_name] = m.display_name;
            });

            let updatedCount = 0;
            const unmapped = [];

            parsed.forEach(item => {
                const displayName = mappingMap[item.name];
                if (displayName) {
                    // 找到映射，更新数据
                    const row = queueData.find(r => r.pit_name === displayName);
                    if (row) {
                        row.queuing = item.value;
                        updatedCount++;
                    }
                } else {
                    // 未找到映射
                    unmapped.push(item);
                }
            });

            renderQueue();

            if (unmapped.length === 0) {
                document.getElementById('autofillMessage').textContent = `✓ 已更新 ${updatedCount} 个煤种`;
                document.getElementById('autofillMessage').style.color = '#52c41a';
            } else {
                document.getElementById('autofillMessage').innerHTML = `✓ 已更新 ${updatedCount} 个煤种 <span style="color: #faad14;">⚠️ 发现 ${unmapped.length} 个新煤种 <a href="#" onclick="showNewCoalConfig(${JSON.stringify(unmapped).replace(/"/g, '&quot;')}); return false;" style="color: #1890ff;">立即配置</a></span>`;
            }

            document.getElementById('autofillText').value = '';
        }

        // 显示新煤种配置
        function showNewCoalConfig(unmapped) {
            const html = `
                <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;" id="newCoalModal">
                    <div style="background: white; border-radius: 8px; padding: 20px; max-width: 600px; max-height: 80vh; overflow-y: auto; width: 90%;">
                        <h3 style="margin-bottom: 15px;">配置新煤种</h3>
                        <table class="data-table" style="margin-bottom: 20px;">
                            <thead>
                                <tr>
                                    <th style="width: 40%;">数据源名称</th>
                                    <th style="width: 40%;">看板显示名称</th>
                                    <th style="width: 20%;">排队中</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${unmapped.map((item, index) => `
                                    <tr>
                                        <td>${item.name}</td>
                                        <td><input type="text" id="newDisplayName_${index}" placeholder="输入简化名称" style="width: 100%; padding: 6px;"></td>
                                        <td>${item.value}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div style="display: flex; gap: 10px; justify-content: flex-end;">
                            <button class="btn btn-danger" onclick="closeNewCoalModal()">暂不处理</button>
                            <button class="btn btn-success" onclick="saveNewCoalConfig(${JSON.stringify(unmapped).replace(/"/g, '&quot;')})">保存并添加到末尾</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        // 关闭新煤种弹窗
        function closeNewCoalModal() {
            const modal = document.getElementById('newCoalModal');
            if (modal) modal.remove();
        }

        // 保存新煤种配置
        async function saveNewCoalConfig(unmapped) {
            const mappings = [];
            const newRows = [];

            for (let i = 0; i < unmapped.length; i++) {
                const displayName = document.getElementById(`newDisplayName_${i}`).value.trim();
                if (!displayName) {
                    alert('请为所有煤种输入显示名称');
                    return;
                }

                mappings.push({
                    source_name: unmapped[i].name,
                    display_name: displayName
                });

                newRows.push({
                    pit_name: displayName,
                    contracted: '',
                    queuing: unmapped[i].value,
                    called: '',
                    entered: ''
                });
            }

            try {
                // 保存映射
                await fetch(`${API_BASE_URL}/billboards/${billboardId}/autofill-mappings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ module: 'queue', mappings: mappings })
                });

                // 添加新行到末尾
                queueData.push(...newRows);
                renderQueue();

                closeNewCoalModal();
                document.getElementById('autofillMessage').textContent = `✓ 已添加 ${newRows.length} 个新煤种`;
                document.getElementById('autofillMessage').style.color = '#52c41a';
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }

        // 管理映射
        async function manageMappings() {
            try {
                const response = await fetch(`${API_BASE_URL}/billboards/${billboardId}/autofill-mappings?module=queue`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                const mappings = result.data || [];

                if (mappings.length === 0) {
                    alert('暂无映射关系，请先使用自动填充功能创建映射');
                    return;
                }

                const html = `
                    <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;" id="manageMappingModal">
                        <div style="background: white; border-radius: 8px; padding: 20px; max-width: 800px; max-height: 80vh; overflow-y: auto; width: 90%;">
                            <h3 style="margin-bottom: 15px;">映射管理 - 排队拉运模块</h3>
                            <table class="data-table" style="margin-bottom: 20px;">
                                <thead>
                                    <tr>
                                        <th style="width: 35%;">数据源名称</th>
                                        <th style="width: 35%;">看板名称</th>
                                        <th style="width: 30%;">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${mappings.map(m => `
                                        <tr id="mappingRow_${m.id}">
                                            <td>${m.source_name}</td>
                                            <td>${m.display_name}</td>
                                            <td>
                                                <button class="btn btn-primary" style="font-size: 12px; padding: 4px 8px;" onclick="editMapping(${m.id}, '${m.source_name.replace(/'/g, "\\'")}', '${m.display_name.replace(/'/g, "\\'")}')">编辑</button>
                                                <button class="btn btn-danger" style="font-size: 12px; padding: 4px 8px;" onclick="deleteMapping(${m.id})">删除</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                            <div style="display: flex; gap: 10px; justify-content: space-between;">
                                <button class="btn btn-danger" onclick="clearAllMappings()">清空全部映射</button>
                                <button class="btn btn-primary" onclick="closeMappingModal()">关闭</button>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', html);
            } catch (error) {
                alert('加载映射失败: ' + error.message);
            }
        }

        // 关闭映射管理弹窗
        function closeMappingModal() {
            const modal = document.getElementById('manageMappingModal');
            if (modal) modal.remove();
        }

        // 编辑映射
        function editMapping(id, sourceName, displayName) {
            const newDisplayName = prompt(`编辑看板名称\n数据源名称: ${sourceName}`, displayName);
            if (newDisplayName && newDisplayName.trim()) {
                fetch(`${API_BASE_URL}/billboards/${billboardId}/autofill-mappings/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ source_name: sourceName, display_name: newDisplayName.trim() })
                })
                .then(() => {
                    closeMappingModal();
                    manageMappings();
                })
                .catch(error => alert('更新失败: ' + error.message));
            }
        }

        // 删除映射
        function deleteMapping(id) {
            if (!confirm('确定要删除这个映射吗？（不会删除表单中的数据）')) return;

            fetch(`${API_BASE_URL}/billboards/${billboardId}/autofill-mappings/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(() => {
                const row = document.getElementById(`mappingRow_${id}`);
                if (row) row.remove();
            })
            .catch(error => alert('删除失败: ' + error.message));
        }

        // 清空所有映射
        function clearAllMappings() {
            if (!confirm('确定要清空所有映射吗？（不会删除表单中的数据）\n这将需要重新配置映射关系。')) return;

            fetch(`${API_BASE_URL}/billboards/${billboardId}/autofill-mappings?module=queue`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(() => {
                alert('映射已清空');
                closeMappingModal();
            })
            .catch(error => alert('清空失败: ' + error.message));
        }

        // 删除配置行（首次配置时使用）
        function removeConfigRow(index) {
            const row = document.querySelector(`#displayName_${index}`).closest('tr');
            if (row) row.remove();
        }

        // ==================== 结束 v1.5 ====================

        loadData();
    </script>
</body>
</html>
