<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煤矿内参告示牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f0f2f5;
        }

        .billboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
        }

        .loading-container, .error-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 20px;
            color: #666;
        }

        /* 顶栏 - v1.3: 可点击恢复所有 | v1.4: Grid布局，副标题下方 */
        .header {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            padding: 20px 30px;
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: auto auto;
            gap: 15px 15px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .header:hover {
            background: linear-gradient(135deg, #357abd 0%, #2b6399 100%);
        }

        .header-logo {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            grid-row: 1;
            grid-column: 1;
        }

        .header-title {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
            grid-row: 1;
            grid-column: 2;
            align-self: center;
        }

        /* v1.3.1: 副标题样式 | v1.3.3: 增大字号 | v1.4: 下方显示，与图标左对齐 */
        .header-subtitle {
            font-size: 22px;
            font-weight: normal;
            opacity: 0.85;
            letter-spacing: 1px;
            grid-row: 2;
            grid-column: 1 / 3;
            margin-left: 0;
        }

        /* 模块通用样式 */
        .module {
            margin: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* v1.3: 模块标题可点击 */
        .module-header {
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
            user-select: none;
        }

        .module-header:hover {
            opacity: 0.85;
        }

        .module-title {
            font-size: 20px;
        }

        /* v1.4.4: 右侧信息区域，支持多行显示 */
        .header-right-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .update-time {
            font-size: 14px;
            opacity: 0.9;
        }

        /* v1.4.4: 价格执行时间样式 */
        .price-execution-time {
            font-size: 13px;
            opacity: 0.85;
        }

        /* v1.3: 模块内容隐藏功能 | v1.3.3: 隐藏整个模块 */
        .module-content {
            transition: max-height 0.3s ease, opacity 0.3s ease;
            overflow: hidden;
        }

        .module-content-hidden {
            max-height: 0 !important;
            opacity: 0;
        }

        /* v1.3.3: 隐藏整个模块（包括标题栏） */
        .module-hidden {
            display: none;
        }

        /* 排队拉运模块 */
        .module-queue .module-header {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
        }

        /* 质量/价格模块 */
        .module-quality .module-header {
            background: linear-gradient(135deg, #52c41a 0%, #3fa516 100%);
        }

        /* 物流费用模块 */
        .module-logistics .module-header {
            background: linear-gradient(135deg, #fa8c16 0%, #d97706 100%);
        }

        /* 广告容器 - v1.4.2: 整个容器只有一个广告标识，右对齐上下居中 */
        .ads-container {
            background-color: #fffbe6;
            padding: 12px 20px;
            border-bottom: 2px solid #ffd666;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .ads-list {
            flex: 1;
        }

        .ad-item {
            color: #d48806;
            font-size: 14px;
            line-height: 1.8;
            font-weight: 500;
        }

        .ad-badge {
            font-size: 11px;
            color: #8c8c8c;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 数据表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        .data-table th,
        .data-table td {
            padding: 12px 15px;
            text-align: center;
            border: 1px solid #e8e8e8;
        }

        .data-table th {
            background-color: #fafafa;
            font-weight: bold;
            color: #333;
            font-size: 15px;
        }

        /* v1.4: 表头可点击隐藏 */
        .data-table th.clickable-header {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.3s ease;
        }

        .data-table th.clickable-header:hover {
            background-color: #e8e8e8;
        }

        /* v1.4: 隐藏的表头和列 */
        .th-hidden,
        .td-hidden {
            display: none;
        }

        .data-table td {
            color: #666;
            font-size: 14px;
        }

        .data-table tbody tr:hover {
            background-color: #f5f5f5;
        }

        /* 变动样式 - v1.4.5.1: 增加选择器优先级 */
        .data-table td.change-up {
            color: #cf1322 !important;
            font-weight: bold;
        }

        .data-table td.change-down {
            color: #3f8600 !important;
            font-weight: bold;
        }

        /* 物流费用表格特殊样式 - v1.1 三列布局 */
        .logistics-table .section-header {
            background-color: #fff7e6;
            font-weight: bold;
            color: #d48806;
            border: 1px solid #ffd666;
            cursor: pointer;
            transition: opacity 0.3s ease;
            user-select: none;
        }

        .logistics-table .section-header:hover {
            opacity: 0.7;
        }

        /* 长途列样式 */
        .logistics-table .section-highway {
            background-color: #e6f7ff;
            color: #0050b3;
        }

        /* v1.4.1: 长途列不再使用特殊边框 */
        .logistics-table .col-highway {
            transition: all 0.3s ease;
        }

        /* v1.3: 隐藏列样式 */
        .col-hidden {
            display: none;
        }

        /* 上站（集运站）列样式 */
        .logistics-table .section-station {
            background-color: #fff7e6;
            color: #d48806;
        }

        .logistics-table .col-station {
            background-color: #fffef9;
            transition: all 0.3s ease;
        }

        /* 铁路列样式 */
        .logistics-table .section-railway {
            background-color: #f6ffed;
            color: #389e0d;
        }

        .logistics-table .col-railway {
            background-color: #fcfff9;
            transition: all 0.3s ease;
        }

        /* 底栏 */
        .footer {
            background-color: #595959;
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-text {
            font-size: 18px;
            font-weight: bold;
        }

        .footer-phone {
            font-size: 16px;
            opacity: 0.9;
        }

        .footer-right {
            display: flex;
            gap: 20px;
        }

        .qrcode-group {
            display: flex;
            gap: 20px;
        }

        .qrcode-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .qrcode-placeholder {
            width: 80px;
            height: 80px;
            background-color: white;
            border: 2px solid #d9d9d9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }

        .qrcode-label {
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
        }

        /* v1.4.6.1: 版本号样式 */
        .version-info {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-align: left;
            padding: 5px 30px;
            background-color: #595959;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .billboard-container {
                padding: 0;
            }

            .module {
                margin: 10px;
            }

            .header {
                padding: 15px 20px;
                gap: 10px 10px;
            }

            .header-logo {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .header-title {
                font-size: 24px;
            }

            .header-subtitle {
                font-size: 16px;
            }

            .data-table {
                font-size: 12px;
            }

            .data-table th,
            .data-table td {
                padding: 8px 5px;
            }

            .footer {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .footer-left {
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-container">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        // 从URL获取billboard ID
        const getBillboardId = () => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id') || '1';
        };

        const formatDateTime = (datetime) => {
            if (!datetime) return '';
            if (typeof datetime !== 'string') return '';
            try {
                let date;
                // SQLite DATETIME 格式: 2024-01-01 12:00:00 (本地时间，无时区)
                // ISO 格式: 2024-01-01T12:00:00.000Z (UTC时间)
                if (datetime.includes('T') && datetime.endsWith('Z')) {
                    // 纯ISO格式，带Z表示UTC
                    date = new Date(datetime);
                } else if (datetime.includes('T')) {
                    // ISO格式但没有Z，当作本地时间
                    date = new Date(datetime);
                } else if (datetime.includes('-') && datetime.includes(':')) {
                    // SQLite DATETIME 格式，当作本地时间处理
                    const [datePart, timePart] = datetime.split(' ');
                    const [year, month, day] = datePart.split('-');
                    const [hour, minute, second] = timePart.split(':');
                    date = new Date(year, month - 1, day, hour, minute, second);
                } else {
                    date = new Date(datetime);
                }
                if (!date || isNaN(date.getTime())) return '';
                return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            } catch (e) {
                return '';
            }
        };

        const renderAds = (ads) => {
            if (!ads || ads.length === 0) return '';
            return `
                <div class="ads-container">
                    <div class="ads-list">
                        ${ads.map(ad => `<div class="ad-item">${ad.content}</div>`).join('')}
                    </div>
                    <div class="ad-badge">广告</div>
                </div>
            `;
        };

        const renderBillboard = (data) => {
            return `
                <div class="billboard-container">
                    <!-- 顶栏 -->
                    <div class="header" id="header-restore">
                        <div class="header-logo">煤</div>
                        <div class="header-title">${data.billboard.name}</div>
                        <div class="header-subtitle">${data.billboard.subtitle || '实时更新 | 准确可靠'}</div>
                    </div>

                    <!-- 排队拉运模块 -->
                    <div class="module module-queue" data-module="queue">
                        <div class="module-header">
                            <span class="module-title">排队拉运</span>
                            ${data.updateTimes.queue && data.updateTimes.queue.updated_at ? `<span class="update-time">更新：${formatDateTime(data.updateTimes.queue.updated_at)}</span>` : ''}
                        </div>
                        <div class="module-content">
                            ${renderAds(data.queueAds)}
                            <table class="data-table" data-module-id="queue">
                                <thead>
                                    <tr>
                                        <th class="clickable-header" data-col-index="0">煤种</th>
                                        <th class="clickable-header" data-col-index="1">已预约</th>
                                        <th class="clickable-header" data-col-index="2">排队中</th>
                                        <th class="clickable-header" data-col-index="3">已叫号</th>
                                        <th class="clickable-header" data-col-index="4">已入场</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.queue.map(item => {
                                        // v1.4.5: 排队中数据变化颜色 | v1.4.6: 添加箭头符号
                                        let queuingClass = '';
                                        let queuingArrow = '';
                                        if (item.previous_queuing && item.queuing) {
                                            const currentQueuing = parseFloat(item.queuing);
                                            const previousQueuing = parseFloat(item.previous_queuing);
                                            if (!isNaN(currentQueuing) && !isNaN(previousQueuing)) {
                                                if (currentQueuing < previousQueuing) {
                                                    queuingClass = 'change-down'; // 减少 → 绿色
                                                    queuingArrow = ' ↓'; // 向下箭头
                                                } else if (currentQueuing > previousQueuing) {
                                                    queuingClass = 'change-up'; // 增加 → 红色
                                                    queuingArrow = ' ↑'; // 向上箭头
                                                }
                                            }
                                        }
                                        return `
                                        <tr>
                                            <td data-col-index="0">${item.pit_name}</td>
                                            <td data-col-index="1">${item.contracted}</td>
                                            <td data-col-index="2" class="${queuingClass}">${item.queuing}${queuingArrow}</td>
                                            <td data-col-index="3">${item.called}</td>
                                            <td data-col-index="4">${item.entered}</td>
                                        </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 质量/价格模块 -->
                    <div class="module module-quality" data-module="quality">
                        <div class="module-header">
                            <span class="module-title">质量/价格</span>
                            <div class="header-right-info">
                                ${data.updateTimes.quality && data.updateTimes.quality.updated_at ? `<div class="update-time">更新：${formatDateTime(data.updateTimes.quality.updated_at)}</div>` : ''}
                                ${data.updateTimes.quality && data.updateTimes.quality.price_execution_time ? `<div class="price-execution-time">${data.updateTimes.quality.price_execution_time}</div>` : ''}
                            </div>
                        </div>
                        <div class="module-content">
                            ${renderAds(data.qualityAds)}
                            <table class="data-table" data-module-id="quality">
                                <thead>
                                    <tr>
                                        <th class="clickable-header" data-col-index="0">煤种</th>
                                        <th class="clickable-header" data-col-index="1">热值</th>
                                        <th class="clickable-header" data-col-index="2">灰分</th>
                                        <th class="clickable-header" data-col-index="3">硫</th>
                                        <th class="clickable-header" data-col-index="4">含税价格</th>
                                        <th class="clickable-header" data-col-index="5">较上期变动</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.quality.map(item => {
                                        const changeClass = item.change_value && item.change_value.startsWith('+') ? 'change-up' :
                                                           item.change_value && item.change_value.startsWith('-') ? 'change-down' : '';
                                        return `
                                            <tr>
                                                <td data-col-index="0">${item.pit_name}</td>
                                                <td data-col-index="1">${item.heat_value}</td>
                                                <td data-col-index="2">${item.ash}</td>
                                                <td data-col-index="3">${item.sulfur}</td>
                                                <td data-col-index="4">${item.price}</td>
                                                <td data-col-index="5" class="${changeClass}">${item.change_value}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 物流费用模块 -->
                    <div class="module module-logistics" data-module="logistics">
                        <div class="module-header">
                            <span class="module-title">物流费用</span>
                            ${data.updateTimes.logistics && data.updateTimes.logistics.updated_at ? `<span class="update-time">更新：${formatDateTime(data.updateTimes.logistics.updated_at)}</span>` : ''}
                        </div>
                        <div class="module-content">
                            ${renderAds(data.logisticsAds)}
                            <table class="data-table logistics-table" data-module-id="logistics">
                                <thead>
                                    <tr>
                                        <th colspan="2" class="section-header section-highway" data-col-type="highway">长途</th>
                                        <th colspan="3" class="section-header section-station" data-col-type="station">上站</th>
                                        <th colspan="2" class="section-header section-railway" data-col-type="railway">铁路</th>
                                    </tr>
                                    <tr>
                                        <th class="col-highway clickable-header" data-col-class="highway-from">起点-终点</th>
                                        <th class="col-highway clickable-header" data-col-class="highway-freight">运费</th>
                                        <th class="col-station clickable-header" data-col-class="station-name">集运站</th>
                                        <th class="col-station clickable-header" data-col-class="station-loading">上站运费</th>
                                        <th class="col-station clickable-header" data-col-class="station-fee">站台费</th>
                                        <th class="col-railway clickable-header" data-col-class="railway-from">起点-终点</th>
                                        <th class="col-railway clickable-header" data-col-class="railway-freight">运费</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${(() => {
                                        const highways = data.logistics.filter(item => item.route_type === 'highway');
                                        const stations = data.logistics.filter(item => item.route_type === 'station');
                                        const railways = data.logistics.filter(item => item.route_type === 'railway');
                                        const maxRows = Math.max(highways.length, stations.length, railways.length, 1);

                                        let rows = '';
                                        for (let i = 0; i < maxRows; i++) {
                                            const highway = highways[i];
                                            const station = stations[i];
                                            const railway = railways[i];

                                            rows += '<tr>';

                                            // 长途列
                                            if (highway) {
                                                const routeText = highway.from_location && highway.to_location ? `${highway.from_location}-${highway.to_location}` : '';
                                                rows += `<td class="col-highway" data-col-class="highway-from">${routeText}</td><td class="col-highway" data-col-class="highway-freight">${highway.freight || ''}</td>`;
                                            } else {
                                                rows += `<td class="col-highway" data-col-class="highway-from"></td><td class="col-highway" data-col-class="highway-freight"></td>`;
                                            }

                                            // 上站列
                                            if (station) {
                                                rows += `<td class="col-station" data-col-class="station-name">${station.station_name || ''}</td><td class="col-station" data-col-class="station-loading">${station.station_loading_fee || ''}</td><td class="col-station" data-col-class="station-fee">${station.station_fee || ''}</td>`;
                                            } else {
                                                rows += `<td class="col-station" data-col-class="station-name"></td><td class="col-station" data-col-class="station-loading"></td><td class="col-station" data-col-class="station-fee"></td>`;
                                            }

                                            // 铁路列
                                            if (railway) {
                                                const routeText = railway.from_location && railway.to_location ? `${railway.from_location}-${railway.to_location}` : '';
                                                rows += `<td class="col-railway" data-col-class="railway-from">${routeText}</td><td class="col-railway" data-col-class="railway-freight">${railway.freight || ''}</td>`;
                                            } else {
                                                rows += `<td class="col-railway" data-col-class="railway-from"></td><td class="col-railway" data-col-class="railway-freight"></td>`;
                                            }

                                            rows += '</tr>';
                                        }
                                        return rows;
                                    })()}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 底栏 -->
                    <div class="footer">
                        <div class="footer-left">
                            <div class="footer-text">扫码 +v 进群看</div>
                            <div class="footer-phone">咨询电话：18622815982</div>
                        </div>
                        <div class="footer-right">
                            <div class="qrcode-group">
                                <div class="qrcode-box">
                                    <div class="qrcode-placeholder">二维码</div>
                                    <div class="qrcode-label">付费群 每日更新</div>
                                </div>
                                <div class="qrcode-box">
                                    <div class="qrcode-placeholder">二维码</div>
                                    <div class="qrcode-label">免费群 每周更新</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- v1.7.1: 版本号 -->
                    <div class="version-info">v1.7.1</div>
                </div>
            `;
        };

        // v1.4.1: 动态更新物流表格第一行表头的colspan
        const updateLogisticsColspan = () => {
            const logisticsTable = document.querySelector('.logistics-table');
            if (!logisticsTable) return;

            // 获取第一行表头
            const highwayHeader = logisticsTable.querySelector('.section-highway');
            const stationHeader = logisticsTable.querySelector('.section-station');
            const railwayHeader = logisticsTable.querySelector('.section-railway');

            // 计算每个子模块可见的列数
            const highwayHeaders = logisticsTable.querySelectorAll('.col-highway.clickable-header:not(.th-hidden)');
            const stationHeaders = logisticsTable.querySelectorAll('.col-station.clickable-header:not(.th-hidden)');
            const railwayHeaders = logisticsTable.querySelectorAll('.col-railway.clickable-header:not(.th-hidden)');

            // 更新colspan
            if (highwayHeader) {
                const visibleCount = highwayHeaders.length;
                if (visibleCount > 0) {
                    highwayHeader.setAttribute('colspan', visibleCount);
                    highwayHeader.style.display = '';
                } else {
                    highwayHeader.style.display = 'none';
                }
            }

            if (stationHeader) {
                const visibleCount = stationHeaders.length;
                if (visibleCount > 0) {
                    stationHeader.setAttribute('colspan', visibleCount);
                    stationHeader.style.display = '';
                } else {
                    stationHeader.style.display = 'none';
                }
            }

            if (railwayHeader) {
                const visibleCount = railwayHeaders.length;
                if (visibleCount > 0) {
                    railwayHeader.setAttribute('colspan', visibleCount);
                    railwayHeader.style.display = '';
                } else {
                    railwayHeader.style.display = 'none';
                }
            }
        };

        // v1.3: 初始化隐藏功能 | v1.3.3: 隐藏整个模块包括标题栏 | v1.4: 表头点击隐藏列
        const initHideFeature = () => {
            // 1. 点击模块标题隐藏/显示整个模块（v1.3.3: 包括标题栏）
            const modules = document.querySelectorAll('[data-module]');
            modules.forEach(module => {
                const header = module.querySelector('.module-header');

                header.addEventListener('click', () => {
                    module.classList.toggle('module-hidden');
                });
            });

            // 2. 点击物流子模块标题隐藏/显示对应列组 | v1.4.1: 隐藏时colspan设为0
            const sectionHeaders = document.querySelectorAll('.section-header[data-col-type]');
            sectionHeaders.forEach(header => {
                header.addEventListener('click', (e) => {
                    e.stopPropagation(); // 防止触发模块标题的点击事件
                    const colType = header.getAttribute('data-col-type');
                    const logisticsTable = header.closest('.logistics-table');
                    const cols = logisticsTable.querySelectorAll(`.col-${colType}`);
                    const headerCols = logisticsTable.querySelectorAll(`.section-${colType}`);

                    // 切换隐藏状态
                    cols.forEach(col => col.classList.toggle('col-hidden'));
                    headerCols.forEach(col => col.classList.toggle('col-hidden'));

                    // v1.4.1: 子模块隐藏时，第一行表头也应该隐藏（colspan无需调整，因为整行都隐藏）
                });
            });

            // 3. v1.4: 点击普通表格表头隐藏/显示对应列（排队拉运、质量/价格）
            const regularHeaders = document.querySelectorAll('.clickable-header[data-col-index]');
            regularHeaders.forEach(header => {
                header.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const colIndex = header.getAttribute('data-col-index');
                    const table = header.closest('table');
                    const moduleId = table.getAttribute('data-module-id');

                    // 切换表头本身
                    header.classList.toggle('th-hidden');

                    // 切换所有对应列的td
                    const cells = table.querySelectorAll(`tbody td[data-col-index="${colIndex}"]`);
                    cells.forEach(cell => cell.classList.toggle('td-hidden'));
                });
            });

            // 4. v1.4: 点击物流表格第二行表头隐藏/显示对应单列 | v1.4.1: 动态调整colspan
            const logisticsHeaders = document.querySelectorAll('.logistics-table .clickable-header[data-col-class]');
            logisticsHeaders.forEach(header => {
                header.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const colClass = header.getAttribute('data-col-class');
                    const table = header.closest('.logistics-table');

                    // 切换表头本身
                    header.classList.toggle('th-hidden');

                    // 切换所有对应列的td
                    const cells = table.querySelectorAll(`tbody td[data-col-class="${colClass}"]`);
                    cells.forEach(cell => cell.classList.toggle('td-hidden'));

                    // v1.4.1: 动态更新第一行表头的colspan
                    updateLogisticsColspan();
                });
            });

            // 5. 点击顶栏恢复所有隐藏的模块、列组、表头列 | v1.4.1: 重置colspan
            const headerRestore = document.getElementById('header-restore');
            if (headerRestore) {
                headerRestore.addEventListener('click', () => {
                    // 显示所有隐藏的模块（v1.3.3: 整个模块）
                    const hiddenModules = document.querySelectorAll('.module-hidden');
                    hiddenModules.forEach(module => {
                        module.classList.remove('module-hidden');
                    });

                    // 显示所有隐藏的物流子模块列组
                    const hiddenCols = document.querySelectorAll('.col-hidden');
                    hiddenCols.forEach(col => {
                        col.classList.remove('col-hidden');
                    });

                    // v1.4: 显示所有隐藏的表头和表格列
                    const hiddenHeaders = document.querySelectorAll('.th-hidden');
                    hiddenHeaders.forEach(th => {
                        th.classList.remove('th-hidden');
                    });

                    const hiddenCells = document.querySelectorAll('.td-hidden');
                    hiddenCells.forEach(td => {
                        td.classList.remove('td-hidden');
                    });

                    // v1.4.1: 恢复后重置物流表格colspan
                    updateLogisticsColspan();
                });
            }
        };

        const loadData = async () => {
            try {
                const billboardId = getBillboardId();
                const response = await fetch(`${API_BASE_URL}/client/billboards/${billboardId}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('app').innerHTML = renderBillboard(result.data);
                    // v1.3: 初始化隐藏功能
                    initHideFeature();
                } else {
                    document.getElementById('app').innerHTML = `
                        <div class="error-container">
                            <div class="error">${result.error || '加载失败'}</div>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="error-container">
                        <div class="error">网络错误，请稍后重试</div>
                    </div>
                `;
            }
        };

        // 初始加载
        loadData();

        // 每30秒自动刷新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
