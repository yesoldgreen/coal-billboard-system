<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煤矿内参官网</title>
    <style>
        :root {
            --bg: #f6f2ea;
            --panel: rgba(255, 252, 245, 0.92);
            --ink: #171717;
            --muted: #62584b;
            --accent: #bd3f2d;
            --accent-dark: #8c271b;
            --line: rgba(23, 23, 23, 0.1);
            --shadow: 0 26px 60px rgba(38, 26, 16, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(189, 63, 45, 0.12), transparent 28%),
                radial-gradient(circle at bottom right, rgba(0, 0, 0, 0.06), transparent 26%),
                linear-gradient(180deg, #f0e9dd 0%, var(--bg) 24%, #f8f5ee 100%);
        }

        .shell {
            width: min(1100px, calc(100% - 28px));
            margin: 0 auto;
            padding: 18px 0 42px;
        }

        .masthead {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 24px;
            border: 1px solid var(--line);
            background: linear-gradient(135deg, rgba(255, 250, 242, 0.88), rgba(248, 240, 228, 0.95));
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #fff8f3;
            background: linear-gradient(135deg, #111 0%, #3a322d 100%);
        }

        .brand-copy h1 {
            font-size: clamp(28px, 4vw, 48px);
            letter-spacing: 1px;
            line-height: 1.05;
        }

        .brand-copy p {
            margin-top: 6px;
            color: var(--muted);
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .badge {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(189, 63, 45, 0.18);
            color: var(--accent-dark);
            background: rgba(189, 63, 45, 0.08);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .hero {
            position: relative;
            margin-top: 18px;
            padding: 56px 28px 36px;
            background: var(--panel);
            border: 1px solid rgba(23, 23, 23, 0.08);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            pointer-events: none;
        }

        .hero::before {
            width: 320px;
            height: 320px;
            top: -180px;
            right: -110px;
            background: radial-gradient(circle, rgba(189, 63, 45, 0.12), transparent 66%);
        }

        .hero::after {
            width: 280px;
            height: 280px;
            bottom: -150px;
            left: -90px;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.07), transparent 68%);
        }

        .hero-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(280px, 360px);
            gap: 28px;
            align-items: center;
        }

        .hero-copy h2 {
            font-size: clamp(40px, 6vw, 78px);
            line-height: 1.04;
            letter-spacing: 1px;
        }

        .hero-copy .lead {
            margin-top: 18px;
            font-size: clamp(20px, 2.4vw, 30px);
            line-height: 1.45;
            color: #2b2b2b;
            font-weight: 700;
        }

        .hero-copy .sublead {
            margin-top: 18px;
            max-width: 38rem;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.9;
        }

        .value-list {
            margin-top: 26px;
            display: grid;
            gap: 10px;
        }

        .value-item {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #2d251f;
            font-size: 16px;
        }

        .value-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, #df7b4d 100%);
            flex-shrink: 0;
        }

        .qr-card {
            justify-self: center;
            width: min(100%, 360px);
            padding: 24px;
            border-radius: 26px;
            background: linear-gradient(180deg, #fffdf9 0%, #fff7eb 100%);
            border: 1px solid rgba(23, 23, 23, 0.08);
            box-shadow: 0 18px 40px rgba(46, 30, 18, 0.12);
            text-align: center;
        }

        .qr-kicker {
            display: inline-block;
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(23, 23, 23, 0.06);
            color: #40352c;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.6px;
        }

        .qr-card h3 {
            font-size: 28px;
            line-height: 1.2;
        }

        .qr-card p {
            margin-top: 12px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.8;
        }

        .qr-frame {
            margin: 18px auto 0;
            width: min(100%, 280px);
            padding: 14px;
            background: #fff;
            border-radius: 24px;
            border: 1px solid rgba(23, 23, 23, 0.08);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6), 0 18px 30px rgba(0, 0, 0, 0.08);
        }

        .qr-image {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            -webkit-touch-callout: default;
        }

        .qr-tip {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(189, 63, 45, 0.08);
            color: var(--accent-dark);
            font-size: 14px;
            line-height: 1.7;
            font-weight: 700;
        }

        .footer-note {
            margin-top: 18px;
            color: rgba(23, 23, 23, 0.52);
            font-size: 12px;
            text-align: center;
        }

        @media (max-width: 880px) {
            .shell {
                width: min(100% - 18px, 760px);
                padding-top: 10px;
            }

            .masthead {
                padding: 18px 18px;
                align-items: flex-start;
                flex-direction: column;
                gap: 14px;
            }

            .hero {
                padding: 34px 18px 26px;
            }

            .hero-grid {
                grid-template-columns: 1fr;
                gap: 26px;
            }

            .hero-copy {
                text-align: center;
            }

            .hero-copy .sublead {
                margin-left: auto;
                margin-right: auto;
            }

            .value-list {
                justify-items: center;
            }
        }

        @media (max-width: 480px) {
            .brand-mark {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .brand-copy h1 {
                font-size: 24px;
            }

            .hero-copy h2 {
                font-size: 36px;
            }

            .hero-copy .lead {
                font-size: 19px;
            }

            .hero-copy .sublead {
                font-size: 15px;
                line-height: 1.8;
            }

            .qr-card {
                padding: 18px 16px 20px;
                border-radius: 22px;
            }

            .qr-card h3 {
                font-size: 22px;
            }

            .qr-tip {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="masthead">
            <div class="brand">
                <div class="brand-mark">煤</div>
                <div class="brand-copy">
                    <h1>煤矿内参</h1>
                    <p>每日煤价、运费动态，做拉煤决策前先看一眼。</p>
                </div>
            </div>
            <div class="badge">新会员群预约中</div>
        </header>

        <main class="hero">
            <div class="hero-grid">
                <section class="hero-copy">
                    <h2>准备上线一个<br>真正有用的付费群</h2>
                    <div class="lead">每天发布各地煤矿最新价格、运费信息。</div>
                    <p class="sublead">
                        我们正在筹备新的收费会员群，核心就是把分散、滞后的煤矿价格和运费信息，整理成更适合每天查看的内参内容。
                        现在先预约进群，正式开放时会优先通知，并提供首批优惠。
                    </p>

                    <div class="value-list">
                        <div class="value-item"><span class="value-dot"></span>每天跟踪各地煤矿价格变化</div>
                        <div class="value-item"><span class="value-dot"></span>同步整理长途、上站、铁路等运费信息</div>
                        <div class="value-item"><span class="value-dot"></span>新群上线后，预约用户优先通知并享受优惠</div>
                    </div>
                </section>

                <aside class="qr-card">
                    <div class="qr-kicker">立即预约</div>
                    <h3>扫码先进群</h3>
                    <p>先进入预约群，后续会员群开放、优惠名额和开群时间都会第一时间在群内通知。</p>
                    <div class="qr-frame">
                        <img class="qr-image" src="/site/assets/group-qr.png" alt="煤矿内参微信群二维码">
                    </div>
                    <div class="qr-tip">微信内打开页面时，可直接长按二维码识别进群。</div>
                </aside>
            </div>
        </main>

        <div class="footer-note">煤矿内参官网 · v1.8</div>
    </div>
</body>
</html>
